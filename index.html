<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Deal - Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        .daraz-orange { background-color: #f57224; }
        .text-daraz { color: #f57224; }
        .admin-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-3d { transition: all 0.1s; box-shadow: 0 4px 0 #c45a1d; }
        .btn-3d:active { transform: translateY(2px); box-shadow: 0 1px 0 #c45a1d; }
        .size-btn-active { background-color: #f57224; color: white; border-color: transparent; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen pb-20" x-data="superAdmin()" x-init="initAdmin()">

    <header class="bg-white shadow-sm sticky top-0 z-50 px-4 py-4 flex items-center justify-between border-b-2 border-orange-500">
        <div>
            <h1 class="text-lg font-black text-gray-800 italic uppercase leading-none">Daily Deal</h1>
            <span class="text-[9px] font-bold text-daraz tracking-[3px] uppercase">Super Admin</span>
        </div>
        <button @click="logout()" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl text-[10px] font-bold uppercase border border-red-100">Logout</button>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6">

        <div class="grid grid-cols-2 gap-3">
            <div class="admin-card p-4 bg-white border-l-4 border-l-blue-500">
                <p class="text-[9px] font-bold text-gray-400 uppercase">মোট অর্ডার</p>
                <p class="text-xl font-black text-gray-800" x-text="stats.total"></p>
            </div>
            <div class="admin-card p-4 bg-white border-l-4 border-l-red-500">
                <p class="text-[9px] font-bold text-red-600 uppercase">মোট প্রোডাক্ট</p>
                <p class="text-xl font-black text-red-700" x-text="products.length"></p>
            </div>
        </div>

        <div class="flex gap-2 overflow-x-auto no-scrollbar py-2">
            <button @click="tab = 'orders'" :class="tab === 'orders' ? 'daraz-orange text-white shadow-md' : 'bg-white text-gray-500 border'" class="px-5 py-2.5 rounded-xl text-[10px] font-bold whitespace-nowrap uppercase">অর্ডার</button>
            <button @click="tab = 'add_product'" :class="tab === 'add_product' ? 'daraz-orange text-white shadow-md' : 'bg-white text-gray-500 border'" class="px-5 py-2.5 rounded-xl text-[10px] font-bold whitespace-nowrap uppercase">পণ্য আপলোড</button>
            <button @click="tab = 'all_products'" :class="tab === 'all_products' ? 'daraz-orange text-white shadow-md' : 'bg-white text-gray-500 border'" class="px-5 py-2.5 rounded-xl text-[10px] font-bold whitespace-nowrap uppercase">সব প্রোডাক্ট</button>
            <button @click="tab = 'settings'" :class="tab === 'settings' ? 'daraz-orange text-white shadow-md' : 'bg-white text-gray-500 border'" class="px-5 py-2.5 rounded-xl text-[10px] font-bold whitespace-nowrap uppercase">সেটিংস</button>
        </div>

        <div x-show="tab === 'orders'" class="space-y-4" x-transition>
            <template x-for="order in allOrders" :key="order.id">
                <div class="admin-card p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black text-gray-400">#<span x-text="order.id"></span></span>
                        <select @change="updateStatus(order.id, $event.target.value)" :class="statusColor(order.status)" class="text-[9px] font-bold px-2 py-1.5 rounded-lg outline-none border cursor-pointer">
                            <option value="পেন্ডিং">পেন্ডিং</option>
                            <option value="কনফার্ম">কনফার্ম</option>
                            <option value="ডেলিভারি">ডেলিভারি</option>
                            <option value="ক্যান্সেল">ক্যান্সেল</option>
                        </select>
                    </div>
                    <div class="flex gap-3">
                        <img :src="order.productImg" class="w-14 h-14 rounded-xl object-cover shadow-sm border">
                        <div class="flex-1">
                            <h4 class="text-[11px] font-black text-gray-800" x-text="order.productName"></h4>
                            <p class="text-[9px] text-blue-600 font-bold italic">TrxID: <span x-text="order.trxID"></span></p>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="tab === 'add_product'" class="admin-card p-6 space-y-4" x-transition>
            <h3 class="font-bold text-xs uppercase italic border-b pb-2">নতুন পণ্য আপলোড</h3>
            <div class="grid grid-cols-5 gap-2">
                <template x-for="(img, idx) in newPhotos" :key="idx">
                    <div class="relative h-12 rounded-lg border-2 border-orange-100 overflow-hidden shadow-sm">
                        <img :src="img" class="w-full h-full object-cover">
                        <button @click="newPhotos.splice(idx, 1)" class="absolute top-0 right-0 bg-red-600 text-white text-[8px] px-1 rounded-bl-lg">X</button>
                    </div>
                </template>
                <label x-show="newPhotos.length < 10" class="h-12 border-2 border-dashed border-orange-200 flex flex-col items-center justify-center rounded-lg cursor-pointer bg-orange-50 hover:bg-orange-100">
                    <i class="fa-solid fa-plus text-orange-400"></i>
                    <input type="file" @change="uploadPhoto" class="hidden" accept="image/*">
                </label>
            </div>
            <input type="text" x-model="pName" placeholder="পণ্যের নাম" class="w-full p-4 bg-gray-50 border rounded-2xl text-xs font-bold outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" x-model="pPrice" placeholder="দাম" class="w-full p-4 bg-gray-50 border rounded-2xl text-xs font-bold outline-none">
                <select x-model="pCat" class="w-full p-4 bg-gray-50 border rounded-2xl text-xs font-bold outline-none">
                    <template x-for="cat in categories">
                        <option :value="cat" x-text="cat"></option>
                    </template>
                </select>
            </div>
            <textarea x-model="pDesc" placeholder="বিস্তারিত বিবরণ..." class="w-full p-4 bg-gray-50 border rounded-2xl text-xs font-bold h-24 outline-none"></textarea>
            <button @click="saveProduct()" class="w-full daraz-orange text-white py-4 rounded-2xl font-black uppercase shadow-lg btn-3d">পণ্য সেভ করুন</button>
        </div>

        <div x-show="tab === 'all_products'" class="space-y-4" x-transition>
            <div class="flex justify-between items-center px-2">
                <h3 class="font-bold text-xs uppercase italic">স্টোর প্রোডাক্ট লিস্ট</h3>
                <span class="text-[10px] bg-orange-100 text-daraz px-3 py-1 rounded-full font-bold" x-text="products.length + ' Items'"></span>
            </div>
            <template x-for="(product, index) in products" :key="index">
                <div class="admin-card p-3 flex items-center gap-4">
                    <img :src="product.images[0]" class="w-16 h-16 rounded-2xl object-cover border shadow-sm">
                    <div class="flex-1">
                        <h4 class="text-[11px] font-black text-gray-800 leading-tight" x-text="product.name"></h4>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-daraz font-black text-xs">৳<span x-text="product.price"></span></span>
                            <span class="text-[8px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded font-bold uppercase" x-text="product.category"></span>
                        </div>
                    </div>
                    <button @click="deleteProduct(index)" class="w-10 h-10 rounded-xl bg-red-50 text-red-500 flex items-center justify-center border border-red-100 active:scale-90 transition shadow-sm">
                        <i class="fa-solid fa-trash-can text-[12px]"></i>
                    </button>
                </div>
            </template>
            <template x-if="products.length === 0">
                <div class="text-center py-10 text-gray-400 text-[10px] font-bold uppercase">কোন প্রোডাক্ট পাওয়া যায়নি</div>
            </template>
        </div>

        <div x-show="tab === 'settings'" class="space-y-6" x-transition>
            <div class="admin-card p-6">
                <h3 class="font-bold text-xs mb-4 uppercase italic border-b pb-2 text-daraz">ব্যানার সেটিংস</h3>
                <div class="w-full h-32 bg-gray-100 rounded-2xl overflow-hidden mb-4 border-2 border-dashed border-orange-200">
                    <img :src="bannerImg" class="w-full h-full object-cover">
                </div>
                <label class="w-full daraz-orange text-white py-4 rounded-2xl font-black text-[10px] uppercase flex items-center justify-center gap-2 cursor-pointer shadow-lg active:scale-95 transition">
                    <i class="fa-solid fa-image"></i> ব্যানার চেঞ্জ করুন
                    <input type="file" @change="updateBanner" class="hidden" accept="image/*">
                </label>
            </div>

            <div class="admin-card p-6 bg-blue-50/30 border-blue-100">
                <h3 class="font-bold text-xs mb-4 uppercase italic border-b pb-2 text-blue-600">টেলিগ্রাম সেটিংস</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">চ্যানেল বা সাপোর্ট লিঙ্ক</label>
                        <input type="text" x-model="tgLink" placeholder="https://t.me/your_channel" class="w-full p-4 bg-white border border-blue-100 rounded-2xl text-xs font-bold outline-none focus:border-blue-400">
                    </div>
                    <button @click="saveSettings()" class="w-full bg-blue-500 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-blue-200 active:scale-95 transition">
                        <i class="fa-brands fa-telegram mr-1"></i> লিঙ্ক আপডেট করুন
                    </button>
                </div>
            </div>
        </div>

    </main>

    <script>
        function superAdmin() {
            return {
                tab: 'orders',
                bannerImg: 'https://img.alicdn.com/imgextra/i4/O1CN01Z9pX4X1C4X4X4X4X4_!!6000000000032-0-tps-1188-356.jpg',
                tgLink: '', 
                pName: '', pPrice: '', pCat: 'সব', pDesc: '', newPhotos: [], selectedSizes: [],
                categories: ['সব', 'বোরকা', 'ইলেকট্রনিক্স', 'গ্যাজেট', 'অফার'],
                
                // Demo Products Data
                products: [
                    { name: 'Dubai Cherry Borka - Black', price: '1250', category: 'বোরকা', images: ['https://via.placeholder.com/150'], description: 'Best quality borka' },
                    { name: 'M10 TWS Wireless Earbuds', price: '450', category: 'গ্যাজেট', images: ['https://via.placeholder.com/150'], description: 'High bass earbuds' }
                ],

                allOrders: [
                    { id: 4587, productName: 'Premium Cherry Borka', productImg: 'https://via.placeholder.com/150', trxID: 'BK-552288', status: 'পেন্ডিং' }
                ],

                get stats() {
                    return { total: this.allOrders.length };
                },

                initAdmin() { console.log("System Ready"); },
                logout() { alert("Logging Out..."); },

                // Product Logic
                uploadPhoto(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => { this.newPhotos.push(ev.target.result); };
                        reader.readAsDataURL(file);
                    }
                },
                saveProduct() {
                    if(!this.pName || this.newPhotos.length === 0) return alert("নাম এবং ছবি দিন!");
                    this.products.unshift({
                        name: this.pName,
                        price: this.pPrice,
                        category: this.pCat,
                        description: this.pDesc,
                        images: [...this.newPhotos]
                    });
                    this.pName = ''; this.pPrice = ''; this.newPhotos = [];
                    alert("প্রোডাক্ট সফলভাবে আপলোড হয়েছে!");
                    this.tab = 'all_products'; // আপলোড শেষে লিস্টে নিয়ে যাবে
                },
                deleteProduct(index) {
                    if(confirm("আপনি কি নিশ্চিতভাবে এই প্রোডাক্টটি ডিলিট করতে চান?")) {
                        this.products.splice(index, 1);
                    }
                },

                // Settings Logic
                updateBanner(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => { this.bannerImg = ev.target.result; };
                        reader.readAsDataURL(file);
                        alert("ব্যানার আপডেট হয়েছে!");
                    }
                },
                saveSettings() {
                    if(!this.tgLink) return alert("লিঙ্ক দিন!");
                    alert("টেলিগ্রাম লিঙ্ক সফলভাবে সেভ হয়েছে!");
                },

                // Order Logic
                updateStatus(id, s) { 
                    const order = this.allOrders.find(o => o.id === id);
                    if(order) order.status = s;
                },
                statusColor(s) {
                    if(s === 'পেন্ডিং') return 'bg-orange-50 text-orange-600 border-orange-200';
                    if(s === 'কনফার্ম') return 'bg-blue-50 text-blue-600 border-blue-200';
                    if(s === 'ডেলিভারি') return 'bg-green-50 text-green-600 border-green-200';
                    return 'bg-red-50 text-red-600 border-red-200';
                }
            }
        }
    </script>
</body>
</html>
